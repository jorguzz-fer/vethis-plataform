# Vethis — infra de desenvolvimento local.
# Postgres e Redis SEM portas publicadas fora da rede do Compose em prod;
# em dev expomos localhost para facilitar acesso das ferramentas.
# Em produção, apenas o proxy (Caddy) fica público (443).

name: vethis

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vethis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vethis}
      POSTGRES_DB: ${POSTGRES_DB:-vethis}
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-vethis}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
