# Vethis — produção (VPS + Docker Compose).
# Subir da RAIZ do repositório:
#   docker compose --env-file .env -f infra/docker-compose.prod.yml up -d --build
#
# Apenas o Caddy expõe portas ao host (80/443). Postgres/Redis/apps são privados.

name: vethis-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  site:
    build:
      context: ..
      dockerfile: apps/site/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # A API é acessada pela rede privada (server-side render).
      API_URL: http://api:3333
      PORT: '3000'
    depends_on:
      - api

  aluno:
    build:
      context: ..
      dockerfile: apps/aluno/Dockerfile
      args:
        VITE_API_URL: ${PUBLIC_API_URL}
    restart: unless-stopped

  backoffice:
    build:
      context: ..
      dockerfile: apps/backoffice/Dockerfile
      args:
        VITE_API_URL: ${PUBLIC_API_URL}
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - site
      - aluno
      - backoffice
      - api

volumes:
  pgdata:
  redisdata:
  caddydata:
  caddyconfig:
